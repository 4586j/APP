server:
  port: 8081
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/erp_demo2?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: erp
    password: Erp@App2026!
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ErpHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    encoding: UTF-8
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      connect-timeout: 2000ms

app:
  security:
    jwt:
      secret: "change-me-in-prod-this-must-be-at-least-256-bit-key-padding-XXXXXXXX"
      access-token-expire-minutes: 30
      refresh-token-expire-days: 30
    captcha:
      # dev 默认关；联调走完整流程时临时改为 true（注意当前是 dev profile）
      enabled: false
      ttl-minutes: 5
      length: 4

logging:
  level:
    com.erp: DEBUG
    org.flywaydb: INFO

erp:
  user:
    persistence: mysql  # mysql | memory
